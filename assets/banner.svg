<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="kkon - a fast, interactive CLI for Kafka Connect">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#131a33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#5eead4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="20" fill="url(#bg)"/>

  <!-- connector wiring motif -->
  <g stroke="url(#wire)" stroke-width="2.5" fill="none" opacity="0.8">
    <path d="M120 250 C 260 250, 300 130, 460 130"/>
    <path d="M120 250 C 280 250, 340 250, 460 250"/>
    <path d="M740 130 C 900 130, 940 250, 1080 250"/>
    <path d="M740 250 C 880 250, 940 250, 1080 250"/>
  </g>
  <g fill="url(#accent)">
    <circle cx="120" cy="250" r="7"/>
    <circle cx="1080" cy="250" r="7"/>
    <circle cx="460" cy="130" r="5"/>
    <circle cx="460" cy="250" r="5"/>
    <circle cx="740" cy="130" r="5"/>
    <circle cx="740" cy="250" r="5"/>
  </g>

  <!-- title -->
  <text x="600" y="170" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="120" font-weight="800" fill="#f8fafc" letter-spacing="2">kkon</text>
  <rect x="465" y="200" width="270" height="6" rx="3" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="600" y="250" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="26" fill="#94a3b8" letter-spacing="1">a fast, interactive CLI for Kafka Connect</text>

  <!-- prompt -->
  <text x="600" y="306" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="22" fill="#5eead4">$ kkon connector list</text>
</svg>
