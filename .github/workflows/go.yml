name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Display Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run gofmt
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2

      - name: Run tests
        run: go test ./... -v

      - name: Build
        run: go build ./...