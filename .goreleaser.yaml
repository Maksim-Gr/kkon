version: 2

project_name: kkon

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: kkon
    binary: kkon
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: kkon
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: "Features"
      regexp: "^.*feat[\\(\\w\\)]*:+.*$"
      order: 0
    - title: "Bug Fixes"
      regexp: "^.*fix[\\(\\w\\)]*:+.*$"
      order: 1
    - title: "Dependencies"
      regexp: "^.*deps[\\(\\w\\)]*:+.*$"
      order: 2
    - title: "🔧 Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^devops:"
      - "^upgrade:"
      - "^todo:"
      - "^remove:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Maksim-Gr
    name: kkon
  draft: false
  prerelease: auto
